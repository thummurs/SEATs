<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEATs — Attendance Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0c0f;
        --bg2: #111318;
        --bg3: #181c23;
        --border: #1e2330;
        --green: #00e676;
        --green-dim: #00994f;
        --red: #ff4444;
        --amber: #ffaa00;
        --text: #e2e8f0;
        --muted: #4a5568;
        --mono: "JetBrains Mono", monospace;
        --sans: "Syne", sans-serif;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        min-height: 100vh;
        overflow-x: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 230, 118, 0.012) 2px,
          rgba(0, 230, 118, 0.012) 4px
        );
        pointer-events: none;
        z-index: 999;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 32px;
        border-bottom: 1px solid var(--border);
        background: var(--bg2);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .logo {
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: var(--green);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.4);
        }
        50% {
          opacity: 0.7;
          box-shadow: 0 0 0 6px rgba(0, 230, 118, 0);
        }
      }
      .header-right {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.05em;
      }
      #clock {
        color: var(--text);
        font-weight: 600;
      }
      main {
        display: grid;
        grid-template-columns: 340px 1fr;
        height: calc(100vh - 57px);
      }
      aside {
        border-right: 1px solid var(--border);
        background: var(--bg2);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      .section {
        border-bottom: 1px solid var(--border);
        padding: 20px;
      }
      .section-label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.2em;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 14px;
      }
      .stats-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .stat-card {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px 14px;
      }
      .stat-value {
        font-family: var(--mono);
        font-size: 28px;
        font-weight: 700;
        color: var(--green);
        line-height: 1;
      }
      .stat-label {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        margin-top: 4px;
        letter-spacing: 0.08em;
      }
      .status-badge {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        padding: 3px 10px;
        border-radius: 3px;
        text-transform: uppercase;
      }
      .badge-active {
        background: rgba(0, 230, 118, 0.15);
        color: var(--green);
        border: 1px solid var(--green-dim);
      }
      .badge-none {
        background: rgba(74, 85, 104, 0.2);
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .badge-ended {
        background: rgba(255, 68, 68, 0.1);
        color: var(--red);
        border: 1px solid rgba(255, 68, 68, 0.3);
      }
      .session-name {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .form-group {
        margin-bottom: 10px;
      }
      label {
        display: block;
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.15em;
        color: var(--muted);
        margin-bottom: 5px;
        text-transform: uppercase;
      }
      input,
      select {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-family: var(--mono);
        font-size: 12px;
        padding: 8px 10px;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus,
      select:focus {
        border-color: var(--green-dim);
      }
      .btn {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 9px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.15s;
        width: 100%;
      }
      .btn-green {
        background: var(--green);
        color: #000;
      }
      .btn-green:hover {
        background: #00ff88;
        box-shadow: 0 0 16px rgba(0, 230, 118, 0.3);
      }
      .btn-red {
        background: transparent;
        color: var(--red);
        border: 1px solid var(--red);
      }
      .btn-red:hover {
        background: rgba(255, 68, 68, 0.1);
      }
      .btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .sessions-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .session-item {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 10px 12px;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .session-item:hover {
        border-color: var(--muted);
      }
      .session-item.selected {
        border-color: var(--green-dim);
      }
      .session-item-code {
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
      }
      .session-item-meta {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        margin-top: 3px;
      }
      .content {
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .feed-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .feed-title {
        font-family: var(--sans);
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
      }
      .feed-subtitle {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      .live-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: var(--green);
        background: rgba(0, 230, 118, 0.1);
        border: 1px solid var(--green-dim);
        border-radius: 20px;
        padding: 4px 12px;
      }
      .live-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
        animation: pulse 1.5s infinite;
      }
      .table-wrap {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead tr {
        background: var(--bg3);
        border-bottom: 1px solid var(--border);
      }
      th {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.18em;
        color: var(--muted);
        text-transform: uppercase;
        text-align: left;
        padding: 12px 16px;
        font-weight: 600;
      }
      td {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text);
        padding: 11px 16px;
        border-bottom: 1px solid var(--border);
      }
      tr:last-child td {
        border-bottom: none;
      }
      tbody tr {
        transition: background 0.1s;
      }
      tbody tr:hover {
        background: var(--bg3);
      }
      tbody tr.new-row {
        animation: slideIn 0.4s ease;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-10px);
          background: rgba(0, 230, 118, 0.08);
        }
        to {
          opacity: 1;
          transform: translateX(0);
          background: transparent;
        }
      }
      .status-present {
        color: var(--green);
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 0.1em;
      }
      .status-denied {
        color: var(--red);
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 0.1em;
      }
      .empty-state {
        padding: 48px;
        text-align: center;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
      }
      #toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px 20px;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text);
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.25s;
        z-index: 200;
        max-width: 320px;
      }
      #toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      #toast.success {
        border-color: var(--green-dim);
        color: var(--green);
      }
      #toast.error {
        border-color: rgba(255, 68, 68, 0.4);
        color: var(--red);
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <div class="logo-dot"></div>
        SEATs // ATTENDANCE SYSTEM
      </div>
      <div class="header-right">
        <span id="clock">--:--:--</span> &nbsp;|&nbsp; AUTO-REFRESH 5s
      </div>
    </header>

    <main>
      <aside>
        <!-- Stats -->
        <div class="section">
          <div class="section-label">Live Stats</div>
          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-value" id="stat-present">—</div>
              <div class="stat-label">PRESENT</div>
            </div>
            <div class="stat-card">
              <div
                class="stat-value"
                id="stat-total"
                style="color: var(--muted)"
              >
                —
              </div>
              <div class="stat-label">TOTAL</div>
            </div>
          </div>
        </div>

        <!-- Active session -->
        <div class="section">
          <div class="section-label">Active Session</div>
          <div
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              margin-bottom: 10px;
            "
          >
            <span class="status-badge badge-none" id="active-badge">NONE</span>
          </div>
          <div
            class="session-name"
            id="active-name"
            style="color: var(--muted); font-size: 11px"
          >
            No session running
          </div>
          <div id="end-btn-wrap" style="display: none; margin-top: 12px">
            <button class="btn btn-red" onclick="endActiveSession()">
              END SESSION
            </button>
          </div>
        </div>

        <!-- Create session -->
        <div class="section">
          <div class="section-label">Create Session</div>
          <div class="form-group">
            <label>Session Code</label>
            <input type="text" id="f-code" placeholder="CS7NS2-LAB-04" />
          </div>
          <div class="form-group">
            <label>Course Name</label>
            <input type="text" id="f-course" placeholder="IoT Lab" />
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="f-date" />
          </div>
          <div class="form-group">
            <label>Lecture No.</label>
            <input type="number" id="f-occurrence" value="1" min="1" />
          </div>
          <button
            class="btn btn-green"
            onclick="createSession()"
            style="margin-top: 4px"
          >
            CREATE + START
          </button>
        </div>

        <!-- Sessions list -->
        <div class="section" style="flex: 1">
          <div class="section-label">All Sessions</div>
          <div class="sessions-list" id="sessions-list">
            <div
              style="
                font-family: var(--mono);
                font-size: 11px;
                color: var(--muted);
              "
            >
              Loading...
            </div>
          </div>
        </div>
      </aside>

      <div class="content">
        <div>
          <div class="feed-header">
            <div>
              <div class="feed-title" id="feed-title">Attendance Feed</div>
              <div class="feed-subtitle" id="feed-subtitle">
                Select a session to view attendance
              </div>
            </div>
            <div class="live-pill" id="live-pill" style="display: none">
              <div class="live-dot"></div>
              LIVE
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Student</th>
                  <th>UID</th>
                  <th>Status</th>
                  <th>Time</th>
                  <th>Device</th>
                </tr>
              </thead>
              <tbody id="attendance-body">
                <tr>
                  <td colspan="6">
                    <div class="empty-state">
                      Select or start a session to see attendance
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <div id="toast"></div>

    <script>
      const API = "http://localhost:3000";
      let selectedSessionId = null;
      let activeSessionId = null;
      let knownRecordIds = new Set();

      // Clock
      setInterval(() => {
        document.getElementById("clock").textContent =
          new Date().toLocaleTimeString("en-IE", { hour12: false });
      }, 1000);

      // Default date
      document.getElementById("f-date").value = new Date()
        .toISOString()
        .split("T")[0];

      // Toast
      function toast(msg, type = "success") {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = `show ${type}`;
        setTimeout(() => (el.className = ""), 3000);
      }

      function fmtTime(iso) {
        if (!iso) return "—";
        return new Date(iso).toLocaleTimeString("en-IE", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        });
      }

      // Load sessions
      async function loadSessions() {
        try {
          const res = await fetch(`${API}/api/sessions`);
          const data = await res.json();
          const active = data.find((s) => s.status === "active");
          updateActiveSession(active || null);

          const list = document.getElementById("sessions-list");
          if (!data.length) {
            list.innerHTML =
              '<div style="font-family:var(--mono);font-size:11px;color:var(--muted);">No sessions yet</div>';
            return;
          }
          list.innerHTML = data
            .map(
              (s) => `
        <div class="session-item ${s.id === selectedSessionId ? "selected" : ""}"
             onclick="selectSession(${s.id},'${s.session_code}','${s.status}')">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div class="session-item-code">${s.session_code}</div>
            <span class="status-badge ${s.status === "active" ? "badge-active" : s.status === "ended" ? "badge-ended" : "badge-none"}"
                  style="font-size:9px;padding:2px 7px;">${s.status.toUpperCase()}</span>
          </div>
          <div class="session-item-meta">${s.course_name} · Lecture ${s.occurrence} · ${s.present_count}/${s.total_students || "?"} present</div>
        </div>`,
            )
            .join("");
        } catch (e) {
          console.error(e);
        }
      }

      function updateActiveSession(session) {
        const badge = document.getElementById("active-badge");
        const name = document.getElementById("active-name");
        const endWrap = document.getElementById("end-btn-wrap");
        const pill = document.getElementById("live-pill");

        if (session) {
          activeSessionId = session.id;
          badge.textContent = "ACTIVE";
          badge.className = "status-badge badge-active";
          name.textContent = `${session.session_code} — ${session.course_name}`;
          name.style.color = "var(--text)";
          endWrap.style.display = "block";
          document.getElementById("stat-present").textContent =
            session.present_count;
          document.getElementById("stat-total").textContent =
            session.total_students || "—";
          if (!selectedSessionId || selectedSessionId !== session.id) {
            selectSession(session.id, session.session_code, "active");
          }
          pill.style.display = "flex";
        } else {
          activeSessionId = null;
          badge.textContent = "NONE";
          badge.className = "status-badge badge-none";
          name.textContent = "No session running";
          name.style.color = "var(--muted)";
          endWrap.style.display = "none";
          document.getElementById("stat-present").textContent = "—";
          document.getElementById("stat-total").textContent = "—";
          pill.style.display = "none";
        }
      }

      function selectSession(id, code, status) {
        selectedSessionId = id;
        document.getElementById("feed-title").textContent = code;
        document.getElementById("feed-subtitle").textContent =
          `Session ID: ${id}`;
        document.getElementById("live-pill").style.display =
          status === "active" ? "flex" : "none";
        knownRecordIds.clear();
        loadAttendance(true);
        loadSessions();
      }

      async function loadAttendance(reset = false) {
        if (!selectedSessionId) return;
        try {
          const res = await fetch(
            `${API}/api/sessions/${selectedSessionId}/attendance`,
          );
          const rows = await res.json();
          const tbody = document.getElementById("attendance-body");

          if (!rows.length) {
            if (reset)
              tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">Waiting for card taps…</div></td></tr>`;
            return;
          }

          if (reset) {
            knownRecordIds.clear();
            tbody.innerHTML = "";
            rows.forEach((r, i) => {
              knownRecordIds.add(r.record_id);
              tbody.insertAdjacentHTML("beforeend", buildRow(r, i + 1, false));
            });
          } else {
            rows.forEach((r, i) => {
              if (!knownRecordIds.has(r.record_id)) {
                knownRecordIds.add(r.record_id);
                const empty = tbody.querySelector(".empty-state");
                if (empty) empty.closest("tr").remove();
                tbody.insertAdjacentHTML(
                  "afterbegin",
                  buildRow(r, knownRecordIds.size, true),
                );
              }
            });
          }

          if (selectedSessionId === activeSessionId) {
            document.getElementById("stat-present").textContent = rows.filter(
              (r) => r.status === "present",
            ).length;
          }
        } catch (e) {
          console.error(e);
        }
      }

      function buildRow(r, idx, isNew) {
        const status =
          r.status === "present"
            ? '<span class="status-present">● PRESENT</span>'
            : '<span class="status-denied">✕ DENIED</span>';
        return `<tr class="${isNew ? "new-row" : ""}">
      <td style="color:var(--muted);font-size:11px;">${String(idx).padStart(2, "0")}</td>
      <td style="font-weight:600;">${r.student_name}</td>
      <td style="color:var(--muted);font-size:11px;">${r.uid}</td>
      <td>${status}</td>
      <td style="color:var(--muted);font-size:11px;">${fmtTime(r.nfc_timestamp)}</td>
      <td style="color:var(--muted);font-size:11px;">${r.device || "—"}</td>
    </tr>`;
      }

      async function createSession() {
        const code = document.getElementById("f-code").value.trim();
        const course = document.getElementById("f-course").value.trim();
        const date = document.getElementById("f-date").value;
        const occurrence = parseInt(
          document.getElementById("f-occurrence").value,
        );
        if (!code || !course || !date) {
          toast("Fill in all fields", "error");
          return;
        }
        if (activeSessionId) {
          toast("End the current active session first", "error");
          return;
        }
        try {
          const r1 = await fetch(`${API}/api/sessions`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              session_code: code,
              course_name: course,
              session_date: date,
              occurrence,
            }),
          });
          const d1 = await r1.json();
          if (!r1.ok) {
            toast(d1.error || "Create failed", "error");
            return;
          }
          const r2 = await fetch(`${API}/api/sessions/${d1.session.id}/start`, {
            method: "PUT",
          });
          const d2 = await r2.json();
          if (!r2.ok) {
            toast(d2.error || "Start failed", "error");
            return;
          }
          toast(`Session ${code} started!`);
          document.getElementById("f-code").value = "";
          await loadSessions();
        } catch (e) {
          toast("Network error", "error");
        }
      }

      async function endActiveSession() {
        if (!activeSessionId) return;
        try {
          const res = await fetch(
            `${API}/api/sessions/${activeSessionId}/end`,
            { method: "PUT" },
          );
          const data = await res.json();
          if (!res.ok) {
            toast(data.error || "End failed", "error");
            return;
          }
          toast(`Session ended — ${data.session.present_count} present`);
          await loadSessions();
        } catch (e) {
          toast("Network error", "error");
        }
      }

      async function refresh() {
        await loadSessions();
        await loadAttendance(false);
      }

      loadSessions();
      setInterval(refresh, 5000);
    </script>
  </body>
</html>
